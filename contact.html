<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Contact Us | Royal Priest Church</title>

              "primary-container": "#002366",
              "error": "#ba1a1a",
              "on-surface-variant": "#444650",
              "inverse-primary": "#b3c5ff",
              "secondary-fixed-dim": "#e3c191",
              "surface-container-highest": "#e3e2e0",
              "secondary": "#735a32",

              "tertiary": "#021526",

              "on-tertiary-container": "#7f91a6",
              "surface-dim": "#dadad8",
              "on-tertiary": "#ffffff",
              "secondary-fixed": "#ffdeae",
              "tertiary-fixed-dim": "#b5c8df",

              "inverse-on-surface": "#f1f1ef",

            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            background: rgba(250, 249, 247, 0.85);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface antialiased overflow-hidden">
<!-- Background Content (Simulated for Modal Context) -->
<main class="min-h-screen relative flex items-center justify-center p-8">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-60 grayscale-[20%]" data-alt="Interior of a modern minimal church sanctuary with high ceilings, warm wooden accents, and soft natural sunlight streaming through high windows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARdHdf2cd73Bc7y7LnKyIPM93qgRuP6XIQ1KBGSPg-UiW2yBtqTvmETQHcHxXnmiLb-M6ziQfpEhYuYYte_Disx_s0Ucxe4tRP2QXgITPRcWQVUjbp-9uyArCq9gT-j0yRRN_OP_G9W8QoWzkcs7EnbaW9W6PxNoOcHWWQ-A6LK-_SPrvWmV68tu0-pdp9u1foSXKJ4c2uYg7REDEGTm3BdGGmTW-a0mbpVhEubotEMav7YD3wWHL4PDn9QECNuRXki6cWWb9jb0o"/>
<div class="absolute inset-0 bg-primary/10 mix-blend-multiply"></div>
</div>
<div class="z-10 text-center max-w-2xl">
<h2 class="font-headline text-5xl md:text-7xl text-primary mb-6 tracking-tight">Our sanctuary is open.</h2>
<p class="font-body text-lg text-on-surface-variant uppercase tracking-widest">Experience the modern sacred.</p>
</div>
</main>
<!-- Modal Backdrop Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-tertiary/40 backdrop-blur-md p-4 md:p-8">
<!-- Modal Container -->
<div class="relative w-full max-w-xl bg-surface-container-lowest rounded-xl shadow-[0_40px_100px_-20px_rgba(0,17,58,0.15)] overflow-hidden">
<!-- Close Icon -->
<button class="absolute top-6 right-6 text-on-surface-variant hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-secondary/50 rounded-full p-1">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<!-- Modal Content Wrapper -->
<div class="p-8 md:p-12">
<!-- Header -->
<header class="mb-10 text-center md:text-left">
<h1 class="font-headline text-4xl text-primary mb-2 tracking-tight">Contact Us</h1>
<p class="font-body text-on-surface-variant/80 tracking-wide">We’d love to hear from you</p>
<div class="w-12 h-[2px] bg-secondary mt-6 hidden md:block"></div>
</header>
<!-- Contact Form -->
<form class="space-y-6">
<!-- Full Name -->
<div class="group">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-secondary transition-colors" for="full_name">Full Name</label>
<input class="w-full bg-surface-container border-none focus:ring-2 focus:ring-secondary/20 rounded-lg py-3 px-4 text-on-surface placeholder:text-outline/60 transition-all font-body" id="full_name" name="full_name" placeholder="Enter your full name" type="text"/>
</div>
<!-- Email Address -->
<div class="group">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-secondary transition-colors" for="email">Email Address</label>
<input class="w-full bg-surface-container border-none focus:ring-2 focus:ring-secondary/20 rounded-lg py-3 px-4 text-on-surface placeholder:text-outline/60 transition-all font-body" id="email" name="email" placeholder="Enter your email" type="email"/>
</div>
<!-- Phone Number -->
<div class="group">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-secondary transition-colors" for="phone">Phone Number</label>
<input class="w-full bg-surface-container border-none focus:ring-2 focus:ring-secondary/20 rounded-lg py-3 px-4 text-on-surface placeholder:text-outline/60 transition-all font-body" id="phone" name="phone" placeholder="Enter your phone number" type="tel"/>
</div>
<!-- Message -->
<div class="group">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2 group-focus-within:text-secondary transition-colors" for="message">Message</label>
<textarea class="w-full bg-surface-container border-none focus:ring-2 focus:ring-secondary/20 rounded-lg py-3 px-4 text-on-surface placeholder:text-outline/60 transition-all font-body resize-none" id="message" name="message" placeholder="Write your message here..." rows="4"></textarea>
</div>
<!-- Action Buttons -->
<div class="flex flex-col-reverse md:flex-row items-center justify-end gap-4 pt-6">
<button class="w-full md:w-auto px-8 py-3 text-secondary font-label text-sm uppercase tracking-widest hover:bg-secondary/5 rounded-lg transition-colors focus:ring-2 focus:ring-secondary/20 outline-none" type="button">
                            Cancel
                        </button>
<button class="w-full md:w-auto px-10 py-3.5 bg-primary text-on-primary font-label text-sm uppercase tracking-widest rounded-lg shadow-lg shadow-primary/10 hover:shadow-xl hover:-translate-y-0.5 active:translate-y-0 transition-all focus:ring-2 focus:ring-secondary outline-none" type="submit">
                            Send Message
                        </button>
</div>
</form>
</div>
<!-- Subtle Tonal Branding Footer -->
<div class="bg-surface-container-low px-8 py-4 flex justify-between items-center">
<span class="font-headline italic text-primary/40 text-sm">Royal Priest Church</span>
<div class="flex gap-4">
<span class="material-symbols-outlined text-outline/40 text-lg">mail</span>
<span class="material-symbols-outlined text-outline/40 text-lg">call</span>
</div>
</div>
</div>
</div>
<!-- Hidden Header/Footer from JSON (Not rendered as per task requirements for Modal focusing, but keeping architecture in mind) -->
</body></html>
